<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Chat & Explorer</title>
    <meta name="description" content="Bitcoin chat and explorer — inspect blocks, transactions, mempool fees, mining, and protocol topics. By Palmer Gill.">
    <meta name="theme-color" content="#080a0d">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://palmergill.com/bitcoin-chat/">
    <meta property="og:title" content="Bitcoin Chat & Explorer — Palmer Gill">
    <meta property="og:description" content="Bitcoin chat and explorer — inspect blocks, transactions, mempool fees, mining, and protocol topics.">
    <meta property="og:image" content="https://palmergill.com/assets/palmer-gill-logo.png">
    <meta property="og:image:width" content="960">
    <meta property="og:image:height" content="960">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Bitcoin Chat & Explorer — Palmer Gill">
    <meta name="twitter:description" content="Bitcoin chat and explorer — inspect blocks, transactions, mempool fees, mining, and protocol topics.">
    <meta name="twitter:image" content="https://palmergill.com/assets/palmer-gill-logo.png">
    <link rel="icon" type="image/png" href="/assets/palmer-gill-logo-small.png">
    <link rel="stylesheet" href="/shared/site-nav.css?v=6">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="chat-panel" aria-label="Bitcoin chat">
            <header class="topbar">
                <a href="/" class="back-link" aria-label="Back to projects">&larr;</a>
                <div class="title-group">
                    <h1>Bitcoin Chat & Explorer</h1>
                    <p id="nodeStatus"><span class="status-dot" aria-hidden="true"></span>Checking Bitcoin data...</p>
                    <p id="demoNotice" class="demo-notice" hidden>Public demo mode uses sample Bitcoin data and local answers. Live node and OpenAI calls stay protected.</p>
                </div>
                <div class="node-pills" aria-label="Bitcoin data summary">
                    <div class="node-pill" id="heightPill">Height --</div>
                    <div class="node-pill" id="syncPill">Sync --</div>
                    <div class="node-pill" id="chainPill">Chain --</div>
                </div>
            </header>

            <div class="chat-layout">
                <aside class="explorer-panel" aria-labelledby="explorerTitle">
                    <div class="explorer-header">
                        <div>
                            <p class="explorer-kicker">Explorer</p>
                            <h2 id="explorerTitle">Chain Lookup</h2>
                        </div>
                        <button type="button" id="refreshExplorerBtn" class="ghost-button">Refresh</button>
                    </div>

                    <form id="explorerSearchForm" class="explorer-search">
                        <label class="sr-only" for="explorerInput">Search by block height, block hash, transaction id, or address</label>
                        <input id="explorerInput" type="text" inputmode="text" autocomplete="off" spellcheck="false" placeholder="Block, txid, or address">
                        <div class="explorer-search-row">
                            <select id="explorerType" aria-label="Lookup type">
                                <option value="auto">Auto</option>
                                <option value="block">Block</option>
                                <option value="tx">Transaction</option>
                                <option value="address">Address</option>
                            </select>
                            <button type="submit">Lookup</button>
                        </div>
                    </form>

                    <div id="explorerStatus" class="explorer-status" role="status"></div>

                    <div class="explorer-grid" aria-label="Bitcoin explorer summaries">
                        <article class="explorer-card" id="latestBlockCard">
                            <div class="card-heading">
                                <span>Latest block</span>
                                <button type="button" class="card-action" data-ask="latest">Ask</button>
                            </div>
                            <div class="card-body muted">Loading latest block...</div>
                        </article>

                        <article class="explorer-card" id="mempoolCard">
                            <div class="card-heading">
                                <span>Mempool</span>
                                <button type="button" class="card-action" data-ask="mempool">Ask</button>
                            </div>
                            <div class="card-body muted">Loading mempool...</div>
                        </article>
                    </div>

                    <section class="explorer-result" id="explorerResult" aria-live="polite" hidden></section>
                </aside>
                <div id="messages" class="messages" aria-live="polite"></div>
            </div>

            <div id="promptChips" class="prompt-chips" aria-label="Suggested prompts">
                <button type="button" class="prompt-chip" data-prompt="What's in the mempool right now?">What's in the mempool?</button>
                <button type="button" class="prompt-chip" data-prompt="What's pushing the Bitcoin price today?">What's moving the price?</button>
                <button type="button" class="prompt-chip" data-prompt="Walk me through how a block is mined.">How does a block get mined?</button>
                <button type="button" class="prompt-chip" data-prompt="When is the next halving and what changes?">Next halving</button>
                <button type="button" class="prompt-chip" data-prompt="What are current fee estimates?">Current fees</button>
            </div>

            <form id="chatForm" class="composer">
                <label class="sr-only" for="messageInput">Ask about Bitcoin blockchain data</label>
                <textarea id="messageInput" rows="1" placeholder="Ask Bitcoin..." maxlength="1000" required></textarea>
                <button type="submit" aria-label="Send message">
                    <span>Send</span>
                </button>
            </form>
        </section>
    </main>
    <script src="/shared/site-nav.js?v=6"></script>
    <script src="/shared/analytics.js?v=1"></script>
    <script src="/shared/api-base.js?v=1"></script>
    <script src="app.js"></script>
</body>
</html>
