<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Dashboard</title>
    <meta name="description" content="Live Bitcoin dashboard — BTC-USD price chart, fees, mempool, blocks, and supply, with a plain-English chat helper. By Palmer Gill.">
    <meta name="theme-color" content="#faf7f1">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://palmergill.com/bitcoin-chat/">
    <meta property="og:title" content="Bitcoin Dashboard — Palmer Gill">
    <meta property="og:description" content="Live Bitcoin dashboard — BTC-USD price chart, fees, mempool, blocks, and supply, with a plain-English chat helper.">
    <meta property="og:image" content="https://palmergill.com/assets/palmer-gill-logo.png">
    <meta property="og:image:width" content="960">
    <meta property="og:image:height" content="960">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Bitcoin Dashboard — Palmer Gill">
    <meta name="twitter:description" content="Live Bitcoin dashboard — BTC-USD price chart, fees, mempool, blocks, and supply, with a plain-English chat helper.">
    <meta name="twitter:image" content="https://palmergill.com/assets/palmer-gill-logo.png">
    <link rel="icon" type="image/png" href="/assets/palmer-gill-logo-small.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/site-nav.css?v=13">
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
    <main class="app-shell">
        <h1 class="sr-only">Bitcoin Dashboard</h1>
        <section class="terminal" aria-label="Bitcoin dashboard">
            <header class="term-titlebar">
                <span class="brand">Bitcoin <em>— the dashboard</em></span>
                <p id="nodeStatus" class="term-status"><span class="status-dot" aria-hidden="true"></span>Checking Bitcoin data...</p>
                <button type="button" id="lookupToggle" class="term-button" aria-expanded="false" aria-controls="explorerDrawer">
                    <span aria-hidden="true">⌕</span> lookup <kbd>⌘K</kbd>
                </button>
                <button type="button" id="chatToggle" class="term-button" aria-expanded="true" aria-controls="chatPanel">chat</button>
            </header>
            <p id="demoNotice" class="demo-notice" hidden>Public demo mode uses sample Bitcoin data and local answers. Live node and OpenAI calls stay protected.</p>

            <section class="explorer-drawer" id="explorerDrawer" aria-label="Chain lookup" hidden>
                <form id="explorerSearchForm" class="explorer-search">
                    <label class="sr-only" for="explorerInput">Search by block height, block hash, transaction id, or address</label>
                    <input id="explorerInput" type="text" inputmode="text" autocomplete="off" spellcheck="false" placeholder="Block height, txid, or address">
                    <select id="explorerType" aria-label="Lookup type">
                        <option value="auto">auto</option>
                        <option value="block">block</option>
                        <option value="tx">transaction</option>
                        <option value="address">address</option>
                    </select>
                    <button type="submit">lookup</button>
                </form>
                <div id="explorerStatus" class="explorer-status" role="status"></div>
                <section class="explorer-result" id="explorerResult" aria-live="polite" hidden></section>
            </section>

            <div class="layout" id="layout">
                <div class="dashboard">
                    <section class="price-hero" aria-label="Bitcoin price">
                        <div class="price-main">
                            <p class="price-label">BTC / USD</p>
                            <p class="price-value" id="priceValue">—</p>
                            <p class="price-meta">
                                <span class="price-change mono" id="priceChange">—</span>
                                <span class="price-range-meta" id="priceRangeMeta"></span>
                            </p>
                        </div>
                        <div class="range-switch" role="group" aria-label="Chart timeframe" id="rangeSwitch">
                            <button type="button" data-range="1d" aria-pressed="false">1D</button>
                            <button type="button" data-range="1w" aria-pressed="false">1W</button>
                            <button type="button" data-range="1m" aria-pressed="true">1M</button>
                            <button type="button" data-range="3m" aria-pressed="false">3M</button>
                            <button type="button" data-range="1y" aria-pressed="false">1Y</button>
                            <button type="button" data-range="5y" aria-pressed="false">5Y</button>
                        </div>
                    </section>

                    <section class="chart-card" aria-label="BTC-USD price chart">
                        <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
                        <p class="chart-note" id="chartNote" role="status"></p>
                    </section>

                    <section class="metric-grid" aria-label="Live chain metrics">
                        <button type="button" class="stat-tile" id="chainTile" data-prompt="What is a block, in simple terms?" title="Ask: what's a block?">
                            <span class="tile-label">The chain right now</span>
                            <span class="tile-value mono" id="chainTileValue">—</span>
                            <span class="tile-caption" id="chainTileCaption">blocks ever mined</span>
                        </button>
                        <button type="button" class="stat-tile" id="feeTile" data-prompt="Why do Bitcoin transaction fees change from day to day?" title="Ask: why do fees change?">
                            <span class="tile-label">Cost to send</span>
                            <span class="tile-value mono accent" id="feeTileValue">—</span>
                            <span class="tile-caption" id="feeTileCaption">checking today's fees…</span>
                        </button>
                        <button type="button" class="stat-tile" id="mempoolTile" data-prompt="What is the mempool and why do transactions wait there?" title="Ask: what's the mempool?">
                            <span class="tile-label">Waiting room</span>
                            <span class="tile-value mono" id="mempoolTileValue">—</span>
                            <span class="tile-caption" id="mempoolTileCaption">payments queued for the next blocks</span>
                        </button>
                        <button type="button" class="stat-tile" id="supplyTile" data-prompt="Why will there only ever be 21 million bitcoin, and what is the halving?" title="Ask: why only 21 million?">
                            <span class="tile-label">Supply released</span>
                            <span class="tile-value mono" id="supplyTileValue">—</span>
                            <span class="tile-caption" id="supplyTileCaption">of all 21M bitcoin already exist</span>
                        </button>
                        <button type="button" class="stat-tile" id="difficultyTile" data-prompt="What is the Bitcoin difficulty adjustment and why does it exist?" title="Ask: what's the difficulty adjustment?">
                            <span class="tile-label">Next difficulty change</span>
                            <span class="tile-value mono" id="difficultyTileValue">—</span>
                            <span class="tile-caption" id="difficultyTileCaption">the network self-tunes every 2,016 blocks</span>
                        </button>
                    </section>

                    <section class="blocks-section" aria-label="Recent blocks">
                        <div class="section-heading">
                            <h2>Recent blocks</h2>
                            <span class="section-note">newest first · click a block to inspect it</span>
                        </div>
                        <div class="blocks-strip" id="blocksStrip">
                            <p class="blocks-empty">Loading recent blocks…</p>
                        </div>
                    </section>
                </div>

                <aside class="chat-panel" id="chatPanel" aria-label="Bitcoin chat helper">
                    <div class="chat-header">
                        <span class="chat-title">The explainer</span>
                        <div class="level-switch" role="group" aria-label="Explanation level" id="levelSwitch">
                            <button type="button" data-level="new" aria-pressed="true">new to this</button>
                            <button type="button" data-level="curious" aria-pressed="false">curious</button>
                            <button type="button" data-level="technical" aria-pressed="false">technical</button>
                        </div>
                    </div>
                    <div id="messages" class="messages" aria-live="polite">
                        <div class="learn-paths" id="learnPaths" aria-label="Starting points">
                            <button type="button" class="learn-chip" data-prompt="I'm completely new to this. What is Bitcoin, actually? Explain it without jargon.">Start from zero</button>
                            <button type="button" class="learn-chip" data-prompt="How does Bitcoin mining work? Who adds new blocks, and why do they bother?">How mining works</button>
                            <button type="button" class="learn-chip" data-prompt="Walk me through what happens to a Bitcoin payment from the moment it is sent until it is fully settled, using the latest real block as an example.">Follow a payment</button>
                        </div>
                    </div>
                    <form id="chatForm" class="composer">
                        <label class="sr-only" for="messageInput">Ask anything about Bitcoin</label>
                        <textarea id="messageInput" rows="1" placeholder="Ask about anything you see…" maxlength="1000" required></textarea>
                        <button type="submit" aria-label="Send message">↑</button>
                    </form>
                </aside>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4" crossorigin="anonymous"></script>
    <script src="/shared/site-nav.js?v=13"></script>
    <script src="/shared/analytics.js?v=1"></script>
    <script src="/shared/api-base.js?v=1"></script>
    <script src="app.js?v=8"></script>
</body>
</html>
