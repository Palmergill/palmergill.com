<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack - Vegas Table</title>
    <meta name="description" content="Browser-based blackjack with splits, doubles, insurance, and a six-deck shoe — by Palmer Gill.">
    <meta name="theme-color" content="#080a0d">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://palmergill.com/blackjack/">
    <meta property="og:title" content="Blackjack — Palmer Gill">
    <meta property="og:description" content="Browser-based blackjack with splits, doubles, insurance, and a six-deck shoe.">
    <meta property="og:image" content="https://palmergill.com/assets/palmer-gill-logo.png">
    <meta property="og:image:width" content="960">
    <meta property="og:image:height" content="960">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Blackjack — Palmer Gill">
    <meta name="twitter:description" content="Browser-based blackjack with splits, doubles, insurance, and a six-deck shoe.">
    <meta name="twitter:image" content="https://palmergill.com/assets/palmer-gill-logo.png">
    <link rel="icon" type="image/png" href="/assets/palmer-gill-logo-small.png">
    <link rel="stylesheet" href="/shared/site-nav.css?v=6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/casino-theme.css?v=1">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css?v=10">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/blackjack/sw.js', { scope: '/blackjack/' }).catch(() => {});
            });
        }
    </script>
</head>
<body>
    <main class="blackjack-shell">
        <header class="game-header">
            <div>
                <h1>Blackjack</h1>
            </div>
            <div class="chip-ledger" aria-label="Chip balance">
                <span>Bankroll</span>
                <strong id="balance">$1000</strong>
            </div>
        </header>

        <section class="session-stats" aria-label="Shoe stats">
            <div class="session-tile"><span>Wins</span><strong id="statWins">0</strong></div>
            <div class="session-tile"><span>Losses</span><strong id="statLosses">0</strong></div>
            <div class="session-tile"><span>Pushes</span><strong id="statPushes">0</strong></div>
            <div class="session-tile"><span>Dealer bust</span><strong id="statDealerBust">0%</strong></div>
            <div class="session-tile session-tile-count" id="countTile" hidden><span>Hi-Lo count</span><strong id="statHiLo">0</strong></div>
        </section>

        <section class="table" aria-label="Blackjack table">
            <div class="table-rail">
                <div class="table-rules">
                    <span>Blackjack pays 3 to 2</span>
                    <span>Dealer hits soft 17</span>
                </div>
                <div class="shoe-meter">
                    <span>Shoe</span>
                    <strong id="shoeCount">312</strong>
                </div>
                <button class="icon-button" id="newShoeButton" type="button" title="Shuffle new shoe" aria-label="Shuffle new shoe">
                    <i data-lucide="refresh-cw" aria-hidden="true"></i>
                </button>
                <button class="table-reset-button" id="countToggleButton" type="button" aria-pressed="false">Show count</button>
                <button class="table-reset-button" id="strategyToggleButton" type="button" aria-pressed="false">Strategy hint</button>
                <button class="table-reset-button" id="resetButton" type="button">Reset bankroll</button>
            </div>

            <section class="dealer-zone" aria-label="Dealer hand">
                <div class="zone-heading">
                    <span>Dealer</span>
                    <strong id="dealerTotal"></strong>
                </div>
                <div class="cards" id="dealerCards"></div>
            </section>

            <section class="player-zone" aria-label="Player hands">
                <div class="zone-heading">
                    <span>Your hands</span>
                    <strong id="activeHandLabel">Bet $25</strong>
                </div>
                <div class="hands" id="playerHands"></div>
            </section>
        </section>

        <aside class="control-panel" aria-label="Game controls">
            <div class="panel-title">
                <h2>Table Controls</h2>
                <span>$5 min · $500 max</span>
            </div>
            <div class="status-bar" id="statusText" role="status">Place your bet.</div>

            <div class="betting-controls" id="bettingControls">
                <div class="bet-display">
                    <span>Bet</span>
                    <strong id="betAmount">$25</strong>
                </div>
                <div class="chip-row" aria-label="Bet chips">
                    <button class="chip-button" type="button" data-chip="5">$5</button>
                    <button class="chip-button" type="button" data-chip="25">$25</button>
                    <button class="chip-button" type="button" data-chip="100">$100</button>
                    <button class="chip-button" type="button" data-chip="500">$500</button>
                </div>
                <div class="bet-stepper">
                    <button class="icon-button" id="betDownButton" type="button" title="Lower bet" aria-label="Lower bet">
                        <i data-lucide="minus" aria-hidden="true"></i>
                    </button>
                    <button class="primary-button" id="dealButton" type="button">Deal</button>
                    <button class="icon-button" id="betUpButton" type="button" title="Raise bet" aria-label="Raise bet">
                        <i data-lucide="plus" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div class="insurance-controls" id="insuranceControls" hidden>
                <button class="secondary-button" id="insuranceButton" type="button">Insurance</button>
                <button class="primary-button" id="declineInsuranceButton" type="button">No Insurance</button>
            </div>

            <div class="action-grid" id="actionControls">
                <button class="secondary-button" id="hitButton" type="button">Hit</button>
                <button class="secondary-button" id="standButton" type="button">Stand</button>
                <button class="secondary-button" id="doubleButton" type="button">Double</button>
                <button class="secondary-button" id="splitButton" type="button">Split</button>
            </div>
        </aside>
    </main>

    <script src="./blackjackGame.js"></script>
    <script src="/shared/casino-profile.js?v=1"></script>
    <script src="/shared/analytics.js?v=1"></script>
    <script src="./app.js?v=11"></script>
    <script src="/shared/site-nav.js?v=6"></script>
</body>
</html>
