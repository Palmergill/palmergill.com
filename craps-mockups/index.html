<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craps Mobile Table Prototype</title>
    <meta name="description" content="Mobile-first craps table prototype with vertical wing layout, chip tray, puck, odds, and props drawer.">
    <meta name="theme-color" content="#07100c">
    <link rel="icon" type="image/png" href="/assets/palmer-gill-logo-small.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850;900&family=Roboto+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/craps-mockups/style.css?v=8">
</head>
<body>
    <main class="craps-app" aria-label="Mobile craps table prototype">
        <header class="hud">
            <button class="icon-btn" type="button" aria-label="Open menu">Menu</button>
            <div class="bankroll-block" aria-live="polite">
                <span>Bankroll</span>
                <strong id="bankroll">$1,000</strong>
            </div>
            <div class="hud-actions">
                <button class="icon-btn" id="edgeToggle" type="button" aria-pressed="false" aria-label="Toggle house edge overlay">i</button>
                <button class="icon-btn" type="button" aria-label="Settings">Set</button>
            </div>
            <div class="phase-strip">
                <strong id="phaseText">COME-OUT</strong>
                <span class="puck off" id="puck">OFF</span>
                <span id="phaseHint">Puck off</span>
            </div>
        </header>

        <section class="felt" aria-label="Craps felt">
            <div class="box-row" aria-label="Place and box numbers">
                <button class="box-zone" type="button" data-bet="place4" aria-label="Place 4">
                    <span>4</span>
                    <small>9:5</small>
                    <em>6.67%</em>
                    <i class="chip-stack place-stack" data-stack="place4"></i>
                </button>
                <button class="box-zone" type="button" data-bet="place5" aria-label="Place 5">
                    <span>5</span>
                    <small>7:5</small>
                    <em>4.00%</em>
                    <i class="chip-stack place-stack" data-stack="place5"></i>
                </button>
                <button class="box-zone" type="button" data-bet="place6" aria-label="Place six">
                    <span>SIX</span>
                    <small>7:6</small>
                    <em>1.52%</em>
                    <i class="chip-stack place-stack" data-stack="place6"></i>
                </button>
                <button class="box-zone" type="button" data-bet="place8" aria-label="Place 8">
                    <span>8</span>
                    <small>7:6</small>
                    <em>1.52%</em>
                    <i class="chip-stack place-stack" data-stack="place8"></i>
                </button>
                <button class="box-zone" type="button" data-bet="place9" aria-label="Place nine">
                    <span>NINE</span>
                    <small>7:5</small>
                    <em>4.00%</em>
                    <i class="chip-stack place-stack" data-stack="place9"></i>
                </button>
                <button class="box-zone" type="button" data-bet="place10" aria-label="Place 10">
                    <span>10</span>
                    <small>9:5</small>
                    <em>6.67%</em>
                    <i class="chip-stack place-stack" data-stack="place10"></i>
                </button>
            </div>

            <button class="felt-band come-band" type="button" data-bet="come" aria-label="Come bet">
                <span>COME</span>
                <em>1.41%</em>
                <i class="chip-stack" data-stack="come"></i>
            </button>

            <button class="felt-band dont-come-band dark-side" type="button" data-bet="dontCome" aria-label="Don't Come bet">
                <span>DON'T COME</span>
                <em>1.36%</em>
                <i class="chip-stack" data-stack="dontCome"></i>
            </button>

            <button class="field-band" type="button" data-bet="field" aria-label="Field bet">
                <span class="field-numbers">2 3 4</span>
                <strong>FIELD</strong>
                <span class="field-numbers">9 10 11 12</span>
                <em>5.56%</em>
                <i class="chip-stack" data-stack="field"></i>
            </button>

            <section class="line-zone" aria-label="Pass and don't pass">
                <button class="dont-pass-band dark-side" type="button" data-bet="dontPass" aria-label="Don't Pass Bar">
                    <span>DON'T PASS BAR</span>
                    <small>Bar 12</small>
                    <em>1.36%</em>
                    <i class="chip-stack" data-stack="dontPass"></i>
                </button>
                <button class="pass-line-band" type="button" data-bet="passLine" aria-label="Pass Line">
                    <span>PASS LINE</span>
                    <em>1.41%</em>
                    <i class="chip-stack" data-stack="passLine"></i>
                </button>
            </section>

            <div class="drawer-row">
                <button class="drawer-trigger" id="oddsButton" type="button">+ Odds</button>
                <button class="drawer-trigger" id="propsButton" type="button" aria-expanded="false">Props</button>
            </div>
        </section>

        <section class="control-deck" aria-label="Chip tray and roll controls">
            <div class="dice-result" aria-live="polite">
                <div class="dice" aria-hidden="true">
                    <span class="die" id="die1">1</span>
                    <span class="die" id="die2">1</span>
                </div>
                <p id="rollMessage">Select a chip and tap the felt.</p>
            </div>

            <div class="chip-tray" role="radiogroup" aria-label="Select chip denomination">
                <button class="tray-chip chip-1" type="button" data-chip="1" role="radio" aria-checked="false">$1</button>
                <button class="tray-chip chip-5 selected" type="button" data-chip="5" role="radio" aria-checked="true">$5</button>
                <button class="tray-chip chip-25" type="button" data-chip="25" role="radio" aria-checked="false">$25</button>
                <button class="tray-chip chip-100" type="button" data-chip="100" role="radio" aria-checked="false">$100</button>
                <button class="tray-chip chip-500" type="button" data-chip="500" role="radio" aria-checked="false">$500</button>
            </div>

            <div class="action-bar">
                <button type="button" id="undoButton">Undo</button>
                <button type="button" id="clearButton">Clear</button>
                <button type="button" id="repeatButton">Repeat</button>
                <button class="roll-btn" type="button" id="rollButton">Roll</button>
            </div>
        </section>

        <section class="props-sheet" id="propsSheet" aria-label="Center proposition bets" aria-hidden="true">
            <div class="sheet-handle"></div>
            <header>
                <strong>Center bets</strong>
                <button type="button" id="closeProps">Done</button>
            </header>
            <div class="prop-grid">
                <button type="button" data-bet="hard4">Hard 4 <small>7:1</small></button>
                <button type="button" data-bet="hard6">Hard 6 <small>9:1</small></button>
                <button type="button" data-bet="hard8">Hard 8 <small>9:1</small></button>
                <button type="button" data-bet="hard10">Hard 10 <small>7:1</small></button>
                <button type="button" data-bet="any7">Any Seven <small>4:1</small></button>
                <button type="button" data-bet="anyCraps">Any Craps <small>7:1</small></button>
                <button type="button" data-bet="craps2">Aces <small>30:1</small></button>
                <button type="button" data-bet="craps3">Ace-Deuce <small>15:1</small></button>
                <button type="button" data-bet="yo11">Yo <small>15:1</small></button>
                <button type="button" data-bet="craps12">Boxcars <small>30:1</small></button>
                <button type="button" data-bet="horn">Horn <small>Split</small></button>
                <button type="button" data-bet="ce">C &amp; E <small>Split</small></button>
            </div>
        </section>

        <section class="breakdown-sheet" id="breakdownSheet" aria-label="Bet breakdown" aria-hidden="true">
            <header>
                <strong id="breakdownTitle">Bet breakdown</strong>
                <button type="button" id="closeBreakdown">Done</button>
            </header>
            <dl>
                <div>
                    <dt>Base bet</dt>
                    <dd id="breakdownBase">$0</dd>
                </div>
                <div>
                    <dt>Odds</dt>
                    <dd id="breakdownOdds">$0</dd>
                </div>
                <div>
                    <dt>Total on felt</dt>
                    <dd id="breakdownTotal">$0</dd>
                </div>
            </dl>
        </section>
    </main>

    <script src="/craps-mockups/mockups.js?v=8"></script>
</body>
</html>
