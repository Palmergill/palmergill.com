<html lang="en">

    <meta property="og:title" content="Craps — Palmer Gill">
    <meta property="og:description" content="Browser-based craps with pass, come, place, and odds bets.">
    <meta property="og:image" content="https://palmergill.com/assets/palmer-gill-logo.png">
    <meta property="og:image:width" content="960">
    <meta property="og:image:height" content="960">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Craps — Palmer Gill">
    <meta name="twitter:description" content="Browser-based craps with pass, come, place, and odds bets.">
    <meta name="twitter:image" content="https://palmergill.com/assets/palmer-gill-logo.png">
    <link rel="icon" type="image/png" href="/assets/palmer-gill-logo-small.png">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="/shared/site-nav.css?v=13">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500;1,700&family=Inter:wght@400;500;600;650;700;750;800;850;900&family=Roboto+Condensed:wght@500;700;900&display=swap" rel="stylesheet">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/craps/sw.js', { scope: '/craps/' }).catch(() => {});
            });
        }
    </script>
    <style>
        /* Theme tokens (palette, gold, fonts) come from the live :root below
           plus /shared/casino-theme.css. The earlier duplicate :root that this
           replaced was fully shadowed and has been removed. */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background: var(--ink);
            color-scheme: dark;
        }

        body {
            min-width: 320px;
            min-height: 100vh;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 84px 84px,
                radial-gradient(circle at 78% 8%, rgba(88, 211, 173, 0.18), transparent 28%),
                radial-gradient(circle at 12% 74%, rgba(37, 130, 92, 0.2), transparent 30%),
                linear-gradient(180deg, #080d0b 0%, #091611 48%, #080f0c 100%);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        button,
        input {
            font: inherit;
        }

        button {
            color: inherit;
        }

        .craps-page {
            position: relative;
            width: min(100%, var(--max));
            margin: 0 auto;
            padding: clamp(22px, 4vw, 46px) 24px 24px;
            isolation: isolate;
        }

        .craps-page::before {
            content: "";
            position: fixed;
            inset: clamp(24px, 3vw, 46px);
            z-index: -1;
            border: 1px solid rgba(255, 255, 255, 0.14);
            pointer-events: none;
        }

        .header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            justify-content: space-between;
            align-items: end;
            margin-bottom: 22px;
            padding-top: clamp(18px, 4vw, 42px);
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            color: var(--gold);
            font-size: 0.76rem;
            font-weight: 850;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 44px;
            height: 1px;
            background: currentColor;
        }

        .header h1 {
            font-family: var(--font-display);
            font-size: clamp(3.4rem, 9vw, 7rem);
            font-weight: 500;
            line-height: 0.9;
            letter-spacing: 0;
        }

        .balance-card {
            min-width: 178px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.026)),
                var(--panel);
            box-shadow: 0 18px 70px rgba(0, 0, 0, 0.16);
        }

        .balance-label {
            display: block;
            margin-bottom: 6px;
            color: var(--quiet);
            font-size: 0.72rem;
            font-weight: 850;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .balance {
            color: var(--gold);
            font-family: var(--font-display);
            font-size: clamp(1.75rem, 4vw, 2.55rem);
            font-weight: 500;
            line-height: 1;
        }

        .bankroll-reset-button {
            display: inline-flex;
            width: 100%;
            min-height: 34px;
            align-items: center;
            justify-content: center;
            margin-top: 12px;
            border: 1px solid rgba(232, 199, 115, 0.42);
            border-radius: 999px;
            background: rgba(201, 162, 75, 0.12);
            color: var(--gold-soft);
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
        }

        .bankroll-reset-button:hover,
        .bankroll-reset-button:focus-visible {
            border-color: rgba(232, 199, 115, 0.7);
            background: rgba(201, 162, 75, 0.2);
            color: #fff8df;
            outline: none;
        }

        .table {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) minmax(310px, 0.92fr);
            gap: 18px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.026)),
                rgba(17, 23, 34, 0.84);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .table::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background:
                linear-gradient(135deg, rgba(255, 122, 110, 0.15), transparent 42%),
                radial-gradient(circle at 88% 14%, rgba(232, 199, 115, 0.16), transparent 30%);
            pointer-events: none;
        }

        .status-bar {
            position: relative;
            z-index: 1;
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            min-height: 46px;
            padding: 0 16px;
            border: 1px solid rgba(232, 199, 115, 0.28);
            border-radius: var(--radius);
            background: rgba(232, 199, 115, 0.1);
            color: color-mix(in srgb, var(--gold) 80%, #ffffff);
            font-size: 0.88rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .main-bets {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .bet-btn {
            --accent: var(--gold);
            position: relative;
            width: 100%;
            min-height: 112px;
            overflow: hidden;
            padding: 18px;
            border: 1px solid color-mix(in srgb, var(--accent) 42%, rgba(255, 255, 255, 0.14));
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, color-mix(in srgb, var(--accent) 15%, transparent), rgba(255, 255, 255, 0.026)),
                rgba(8, 10, 13, 0.58);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.17);
            color: inherit;
            cursor: pointer;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
            text-align: center;
        }

        .bet-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent), transparent 48%),
                radial-gradient(circle at 86% 16%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 32%);
            opacity: 0.72;
            pointer-events: none;
        }

        .bet-btn:hover,
        .bet-btn:focus-visible {
            transform: translateY(-3px);
            border-color: color-mix(in srgb, var(--accent) 66%, rgba(255, 255, 255, 0.2));
            background:
                linear-gradient(145deg, color-mix(in srgb, var(--accent) 20%, transparent), rgba(255, 255, 255, 0.04)),
                rgba(8, 10, 13, 0.72);
            outline: none;
        }

        .bet-btn:active {
            transform: translateY(0);
        }

        .bet-btn .label,
        .bet-btn .amt {
            position: relative;
            z-index: 1;
            display: block;
        }

        .bet-btn .label {
            color: #ffffff;
            font-size: 0.88rem;
            font-weight: 850;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .bet-btn .amt {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 750;
        }

        .bet-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .pass { --accent: #f7f3ea; }
        .dont,
        .dont-come { --accent: var(--blue); }
        .come { --accent: var(--coral); }
        .place { --accent: var(--gold); }
        .center { --accent: var(--teal); }

        .quick-actions,
        .active-bets-strip {
            position: relative;
            z-index: 1;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            grid-column: 1 / -1;
            gap: 8px;
            align-content: start;
            justify-content: flex-start;
        }

        .quick-btn,
        .close-btn,
        .quick-amt,
        .modal-btn,
        .odds-btn,
        .skip-btn {
            min-height: 42px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
        }

        .quick-btn {
            padding: 0 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.055);
            color: rgba(247, 243, 234, 0.78);
            font-size: 0.76rem;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .quick-btn:hover,
        .quick-btn:focus-visible {
            transform: translateY(-2px);
            border-color: rgba(232, 199, 115, 0.5);
            background: rgba(232, 199, 115, 0.1);
            color: #ffffff;
            outline: none;
        }

        .quick-btn:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            transform: none;
        }

        .active-bets-strip {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 0;
        }

        .active-bets-strip:empty { display: none; }

        .bet-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 4px 10px 4px 12px;
            border: 1px solid rgba(232, 199, 115, 0.34);
            border-radius: 999px;
            background: rgba(232, 199, 115, 0.1);
            color: color-mix(in srgb, var(--gold) 72%, #ffffff);
            font-size: 0.74rem;
            font-weight: 760;
        }

        .bet-chip .chip-x,
        .bet-chip .chip-odds {
            min-height: 24px;
            padding: 1px 7px;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 850;
            letter-spacing: 0.04em;
            cursor: pointer;
        }

        .bet-chip .chip-x {
            border: 1px solid rgba(255, 122, 110, 0.34);
            background: rgba(255, 122, 110, 0.09);
            color: var(--coral);
        }

        .bet-chip .chip-odds {
            border: 1px solid rgba(88, 211, 173, 0.38);
            background: rgba(88, 211, 173, 0.1);
            color: var(--teal);
        }

        .bet-chip .chip-x:disabled {
            cursor: not-allowed;
            opacity: 0.36;
        }

        .dice-area {
            position: relative;
            z-index: 1;
            grid-column: 2;
            grid-row: 2 / span 2;
            display: flex;
            min-height: 100%;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            padding: clamp(22px, 4vw, 36px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.095), rgba(255, 255, 255, 0.024)),
                rgba(8, 10, 13, 0.56);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-align: center;
        }

        .dice-area::before {
            content: "";
            position: absolute;
            inset: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius);
            pointer-events: none;
        }

        .dice-container {
            display: flex;
            gap: clamp(14px, 3vw, 26px);
            justify-content: center;
            margin-bottom: 18px;
        }

        .die {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: clamp(74px, 11vw, 108px);
            height: clamp(74px, 11vw, 108px);
            padding: clamp(8px, 1.3vw, 13px);
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, #fffaf0 0%, #d8dce2 100%);
            box-shadow:
                0 24px 48px rgba(0, 0, 0, 0.32),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .die-dot {
            align-self: center;
            justify-self: center;
            width: clamp(11px, 1.55vw, 16px);
            height: clamp(11px, 1.55vw, 16px);
            border-radius: 50%;
            background: #111722;
            box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.35);
        }

        .die-dot.hidden { opacity: 0; }

        .point-display {
            min-height: 24px;
            margin-bottom: 16px;
            color: var(--gold);
            font-size: 0.84rem;
            font-weight: 850;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .roll-result-burst {
            position: absolute;
            top: 14px;
            left: 50%;
            z-index: 5;
            min-width: 104px;
            padding: 8px 14px;
            border: 1px solid currentColor;
            border-radius: 999px;
            background: rgba(8, 10, 13, 0.92);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.38);
            font-size: 1.15rem;
            font-weight: 850;
            letter-spacing: 0;
            opacity: 0;
            pointer-events: none;
            text-align: center;
            transform: translate(-50%, 8px) scale(0.85);
        }
        .roll-result-burst.win {
            color: var(--teal);
            text-shadow: 0 0 12px rgba(88, 211, 173, 0.55);
        }
        .roll-result-burst.loss {
            color: var(--coral);
            text-shadow: 0 0 12px rgba(255, 122, 110, 0.55);
        }
        .roll-result-burst.active {
            animation: rollResultBurst 1.2s ease-out forwards;
        }
        @keyframes rollResultBurst {
            0% { opacity: 0; transform: translate(-50%, 12px) scale(0.82); }
            18% { opacity: 1; transform: translate(-50%, 0) scale(1.12); }
            42% { opacity: 1; transform: translate(-50%, -4px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -34px) scale(0.96); }
        }
        .roll-btn {
            width: 100%;
            min-height: 56px;
            border: 1px solid #f7f3ea;
            border-radius: var(--radius);
            background: #f7f3ea;
            color: #0a0d12;
            font-size: 0.95rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 180ms ease, background 180ms ease, border-color 180ms ease, opacity 180ms ease;
        }

        .roll-btn:hover,
        .roll-btn:focus-visible {
            transform: translateY(-2px);
            border-color: var(--gold);
            background: var(--gold);
            outline: none;
        }

        .roll-btn:active {
            transform: translateY(0);
        }

        .roll-btn:disabled {
            opacity: 0.48;
            cursor: not-allowed;
            transform: none;
        }

        .submenu {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            flex-direction: column;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 84px 84px,
                radial-gradient(circle at 78% 8%, rgba(88, 211, 173, 0.14), transparent 28%),
                linear-gradient(180deg, #080d0b 0%, #091611 48%, #080f0c 100%);
        }

        .submenu.active { display: flex; }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: clamp(18px, 4vw, 34px) clamp(18px, 5vw, 48px);
            border-bottom: 1px solid var(--line);
            background: rgba(8, 10, 13, 0.82);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .menu-header h2 {
            color: var(--text);
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 500;
            line-height: 0.96;
            letter-spacing: 0;
        }

        .close-btn {
            padding: 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            font-size: 0.84rem;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .close-btn:hover,
        .close-btn:focus-visible {
            transform: translateY(-2px);
            border-color: rgba(232, 199, 115, 0.5);
            background: rgba(232, 199, 115, 0.1);
            outline: none;
        }

        .numbers-grid,
        .center-grid {
            width: min(100%, var(--max));
            margin: 0 auto;
            overflow-y: auto;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: clamp(18px, 4vw, 40px) 24px 36px;
        }

        .number-btn {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 1px solid rgba(232, 199, 115, 0.34);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(232, 199, 115, 0.14), rgba(255, 255, 255, 0.024)),
                var(--panel);
            color: var(--gold);
            box-shadow: 0 18px 70px rgba(0, 0, 0, 0.16);
            cursor: pointer;
            font: inherit;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }

        .number-btn:hover,
        .number-btn:focus-visible,
        .center-btn-tile:hover,
        .center-btn-tile:focus-visible {
            transform: translateY(-4px);
            outline: none;
        }

        .number-btn .num {
            color: #ffffff;
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 500;
            line-height: 0.95;
        }

        .number-btn .payout,
        .number-btn .bet-info {
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .number-btn .bet-info {
            color: var(--gold);
        }

        .number-btn.has-bet {
            border-color: rgba(247, 243, 234, 0.68);
            background:
                linear-gradient(145deg, rgba(232, 199, 115, 0.24), rgba(255, 255, 255, 0.045)),
                var(--panel);
        }

        .center-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: clamp(18px, 4vw, 40px) 24px 36px;
        }

        .center-btn-tile {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border: 1px solid rgba(255, 122, 110, 0.34);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 122, 110, 0.14), rgba(255, 255, 255, 0.024)),
                var(--panel);
            box-shadow: 0 18px 70px rgba(0, 0, 0, 0.16);
            cursor: pointer;
            font: inherit;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }

        .center-btn-tile .label {
            max-width: 9ch;
            color: #ffffff;
            font-size: clamp(0.9rem, 2.8vw, 1.35rem);
            font-weight: 850;
            line-height: 1.05;
            text-align: center;
            text-transform: uppercase;
        }

        .center-btn-tile .payout,
        .center-btn-tile .bet-info {
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-align: center;
            text-transform: uppercase;
        }

        .center-btn-tile .bet-info {
            color: var(--gold);
        }

        .center-btn-tile.has-bet {
            border-color: rgba(232, 199, 115, 0.72);
            background:
                linear-gradient(145deg, rgba(255, 122, 110, 0.2), rgba(232, 199, 115, 0.08)),
                var(--panel);
        }

        .bet-modal {
            display: none;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 200;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .bet-modal.active { display: flex; }

        .bet-modal-content {
            width: 100%;
            max-width: 380px;
            padding: 24px;
            border: 1px solid rgba(232, 199, 115, 0.34);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.026)),
                #111722;
            box-shadow: var(--shadow);
        }

        .bet-modal h3 {
            margin-bottom: 10px;
            color: var(--text);
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 500;
            line-height: 1;
            text-align: center;
        }

        .bet-modal .current-bet-info {
            min-height: 20px;
            margin-bottom: 14px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 700;
            text-align: center;
        }

        .bet-info-strip {
            margin-bottom: 14px;
            padding: 10px 12px;
            border: 1px solid rgba(232, 199, 115, 0.28);
            border-radius: 8px;
            background: rgba(232, 199, 115, 0.08);
            color: var(--muted);
            font-size: 0.78rem;
            line-height: 1.45;
        }
        .bet-info-strip:empty { display: none; }
        .bet-info-strip strong {
            display: block;
            margin-bottom: 4px;
            color: var(--text);
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .bet-info-strip .edge {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(247, 243, 234, 0.86);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .bet-modal input {
            width: 100%;
            margin-bottom: 14px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: var(--radius);
            background: rgba(8, 10, 13, 0.64);
            color: var(--text);
            appearance: textfield;
            -moz-appearance: textfield;
            font-family: var(--font-display);
            font-size: 2.1rem;
            font-weight: 500;
            text-align: center;
        }

        .bet-modal input::-webkit-outer-spin-button,
        .bet-modal input::-webkit-inner-spin-button {
            margin: 0;
            -webkit-appearance: none;
        }

        .bet-modal input:focus {
            border-color: rgba(232, 199, 115, 0.62);
            outline: none;
        }

        .bet-modal input::placeholder { color: rgba(247, 243, 234, 0.32); }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .quick-amt {
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.055);
            color: rgba(247, 243, 234, 0.82);
            font-size: 0.9rem;
            font-weight: 800;
            text-align: center;
        }

        .quick-amt:hover,
        .quick-amt:focus-visible {
            border-color: rgba(232, 199, 115, 0.5);
            background: rgba(232, 199, 115, 0.1);
            outline: none;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal-actions.three-col { grid-template-columns: 1fr 1fr 1fr; }

        .modal-btn {
            padding: 0 12px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            font-size: 0.82rem;
            font-weight: 850;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .modal-btn:hover,
        .modal-btn:focus-visible,
        .odds-btn:hover,
        .odds-btn:focus-visible,
        .skip-btn:hover,
        .skip-btn:focus-visible {
            transform: translateY(-2px);
            outline: none;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.055);
            color: rgba(247, 243, 234, 0.8);
        }

        .modal-btn.confirm {
            border-color: #f7f3ea;
            background: #f7f3ea;
            color: #0a0d12;
        }

        .modal-btn.remove {
            border-color: rgba(255, 122, 110, 0.48);
            background: rgba(255, 122, 110, 0.11);
            color: var(--coral);
        }

        .point-popup {
            display: none;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 300;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .point-popup.active { display: flex; }

        .point-popup-content {
            width: 100%;
            max-width: 380px;
            padding: 28px;
            border: 1px solid rgba(232, 199, 115, 0.34);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.026)),
                #111722;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .point-popup h2 {
            color: var(--gold);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .point-popup .point-number {
            margin: 16px 0;
            color: #ffffff;
            font-family: var(--font-display);
            font-size: 5rem;
            font-weight: 500;
            line-height: 0.9;
        }

        .point-popup .point-text {
            margin-bottom: 20px;
            color: var(--muted);
            font-size: 1rem;
        }

        .odds-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .odds-btn {
            border: 1px solid rgba(232, 199, 115, 0.34);
            background: rgba(232, 199, 115, 0.1);
            color: var(--gold);
            font-size: 0.9rem;
            font-weight: 850;
        }

        .odds-btn.max-btn {
            grid-column: span 3;
            border-color: #f7f3ea;
            background: #f7f3ea;
            color: #0a0d12;
        }

        .point-popup .skip-btn {
            padding: 0 24px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.16);
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 850;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .point-popup .timer-bar {
            height: 4px;
            margin-top: 16px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--gold), var(--coral));
            animation: timerCountdown 10s linear forwards;
        }

        @keyframes timerCountdown {
            from { width: 100%; }
            to { width: 0%; }
        }

        footer {
            text-align: center;
            padding: 22px 24px 34px;
            color: var(--quiet);
            font-size: 0.78rem;
        }

        @media (max-width: 980px) {
            .table {
                grid-template-columns: 1fr;
            }

            .dice-area {
                grid-column: 1;
                grid-row: auto;
            }

            .quick-actions {
                grid-column: 1;
            }
        }

        @media (max-width: 899px) {
            .craps-page {
                padding: 18px 18px 20px;
            }

            .craps-page::before {
                inset: calc(var(--site-nav-mobile-height, 56px) + 14px) 14px 14px;
            }

            .submenu,
            .bet-modal,
            .point-popup {
                top: var(--site-nav-mobile-height, 56px);
            }
        }

        @media (max-width: 620px) {
            .header {
                grid-template-columns: 1fr;
                align-items: start;
                gap: 14px;
                margin-bottom: 16px;
                padding-top: 8px;
            }

            .header h1 {
                font-size: clamp(3rem, 15vw, 4.2rem);
            }

            .balance-card {
                width: 100%;
                padding: 14px 16px;
            }

            .balance {
                font-size: 1.95rem;
            }

            .table {
                padding: 12px;
                gap: 10px;
            }

            .status-bar {
                min-height: 42px;
                font-size: 0.76rem;
                letter-spacing: 0.05em;
            }

            .main-bets {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 8px;
            }

            .bet-btn {
                min-height: 84px;
                padding: 12px 8px;
            }

            .bet-btn .label {
                font-size: 0.64rem;
                line-height: 1.15;
            }

            .bet-btn .amt {
                margin-top: 8px;
                font-size: 0.7rem;
                line-height: 1.2;
            }

            .quick-actions {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
            }

            .quick-btn {
                padding: 0 8px;
                font-size: 0.68rem;
            }

            .dice-area {
                padding: 20px 16px;
            }

            .numbers-grid,
            .center-grid {
                grid-template-columns: repeat(2, 1fr);
                padding-inline: 18px;
            }

            .modal-actions.three-col {
                grid-template-columns: 1fr;
            }
        }

        /* Casino table theme — warm felt + wood. Brand gold and fonts come
           from /shared/casino-theme.css; only craps-specific tokens here. */
        :root {
            --ink: #0a0805;
            --felt-deep: #052a1a;
            --felt: #0a4429;
            --felt-light: #115c39;
            --gold-bright: #f6e3a6;
            --gold-shadow: #7c5e1c;
            --serif: "Playfair Display", Georgia, "Times New Roman", serif;
            --panel: rgba(0, 0, 0, 0.24);
            --panel-soft: rgba(255, 255, 255, 0.045);
            --line: rgba(232, 199, 115, 0.4);
            --line-strong: rgba(232, 199, 115, 0.55);
            --text: #f5ebd8;
            --muted: rgba(245, 235, 216, 0.74);
            --quiet: rgba(245, 235, 216, 0.5);
            --teal: #58d3ad;
            --blue: #72a9ff;
            --coral: #ff7a6e;
            --danger: #ff6f7d;
            --radius: 9px;
            --max: 1180px;
            --shadow: 0 28px 80px rgba(0, 0, 0, 0.55);
        }

        html {
            background: #0a0805;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 50% -12%, #18120a 0%, #0a0805 62%);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.4;
            animation: pageFadeIn 360ms ease-out both;
        }

        .craps-page {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 16px;
            width: min(1180px, calc(100vw - 32px));
            min-height: calc(100vh - var(--site-nav-height, 52px) - var(--casino-header-height, 0px));
            min-height: calc(100dvh - var(--site-nav-height, 52px) - var(--casino-header-height, 0px));
            margin: 0 auto;
            padding: 24px 0;
        }

        .craps-page::before {
            display: none;
        }

        .header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
            margin: 0;
            padding: 0;
        }

        .eyebrow {
            margin: 0 0 5px;
            color: var(--gold);
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            display: none;
        }

        .header h1,
        .menu-header h2,
        .bet-modal h3,
        .point-popup .point-number {
            color: var(--text);
            font-family: var(--font-display);
            font-weight: 700;
            letter-spacing: 0.01em;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            font-size: clamp(2.45rem, 5vw, 5.1rem);
            line-height: 0.88;
            background: linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--gold-deep));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .balance-card {
            display: grid;
            gap: 2px;
            min-width: 132px;
            padding: 10px 12px;
            border: 1px solid var(--line-strong);
            border-radius: var(--radius);
            background: rgba(8, 15, 13, 0.58);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .balance-label,
        .status-bar,
        .point-display,
        .bet-btn .label,
        .quick-btn,
        .modal-btn,
        .close-btn,
        .skip-btn,
        .odds-btn,
        .number-btn .payout,
        .number-btn .bet-info,
        .center-btn-tile .payout,
        .center-btn-tile .bet-info {
            font-family: inherit;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .balance-label {
            margin: 0;
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0;
        }

        .balance {
            color: var(--gold);
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: 900;
            line-height: 1.1;
        }

        .table {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 318px;
            gap: 16px;
            min-height: 636px;
            overflow: hidden;
            padding: 22px;
            border: 13px solid transparent;
            border-radius: 18px;
            background:
                radial-gradient(ellipse 110% 100% at 50% 35%, var(--felt-light), var(--felt) 50%, var(--felt-deep) 100%) padding-box,
                linear-gradient(165deg, var(--gold-bright), var(--gold) 30%, var(--gold-deep) 62%, var(--gold-shadow)) border-box;
            box-shadow:
                inset 0 0 0 1px rgba(0, 0, 0, 0.45),
                inset 0 0 90px rgba(0, 0, 0, 0.5),
                var(--shadow);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            animation: tableSettle 520ms cubic-bezier(.2, .75, .2, 1) both;
        }

        .table::before {
            inset: 7px;
            border: 1px solid rgba(232, 199, 115, 0.3);
            border-radius: 11px;
            background:
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.02) 0 2px, transparent 2px 9px);
            opacity: 1;
        }

        .status-bar {
            grid-column: 1 / -1;
            justify-content: center;
            min-height: 56px;
            padding: 12px 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(0, 0, 0, 0.22);
            color: var(--gold-bright);
            font-family: var(--serif);
            font-style: italic;
            font-weight: 600;
            font-size: 1.12rem;
            letter-spacing: 0.01em;
            line-height: 1.3;
            text-align: center;
            text-transform: none;
        }

        .main-bets {
            grid-template-columns: repeat(6, minmax(0, 1fr));
            grid-template-rows: auto minmax(104px, auto) minmax(72px, auto) minmax(70px, auto) minmax(86px, auto);
            gap: 8px;
            min-width: 0;
        }

        .layout-section,
        .number-zone {
            position: relative;
            z-index: 1;
            min-width: 0;
        }

        .layout-section {
            border: 1px solid rgba(255, 236, 177, 0.36);
            border-radius: var(--radius);
            background: rgba(5, 31, 22, 0.34);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .place-row {
            grid-column: 1 / -1;
            padding: 9px;
        }

        .layout-section-heading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
            color: var(--gold);
            font-family: var(--serif);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.24em;
            text-transform: uppercase;
        }

        .layout-section-heading::before,
        .layout-section-heading::after {
            content: "\2666";
            color: var(--gold-deep);
            font-size: 0.7rem;
        }

        .layout-section-heading span:last-child {
            color: var(--muted);
            font-family: var(--serif);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.06em;
        }

        .place-number-row {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 7px;
        }

        .number-zone {
            display: grid;
            min-height: 88px;
            place-items: center;
            padding: 10px 6px 8px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background:
                linear-gradient(180deg, rgba(232, 199, 115, 0.08), rgba(0, 0, 0, 0.2));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
            color: var(--text);
            cursor: pointer;
            font: inherit;
            transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
        }

        .number-zone:hover,
        .number-zone:focus-visible {
            filter: brightness(1.08);
            transform: translateY(-1px);
            outline: none;
        }

        .number-zone.has-bet {
            border-color: var(--gold-bright);
            background:
                linear-gradient(180deg, rgba(232, 199, 115, 0.22), rgba(0, 0, 0, 0.1));
            box-shadow: 0 0 0 1px var(--gold), 0 0 22px rgba(232, 199, 115, 0.3);
        }

        .number-zone.point-on {
            border-color: var(--cream);
        }

        .number-zone.point-on::after {
            content: "ON";
            position: absolute;
            top: 3px;
            right: 3px;
            display: grid;
            place-items: center;
            width: clamp(17px, 4.6vw, 24px);
            height: clamp(17px, 4.6vw, 24px);
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #fffdf5, #ece2c8);
            color: #1a1208;
            font-size: clamp(0.4rem, 1.2vw, 0.56rem);
            font-weight: 900;
            letter-spacing: 0.05em;
            box-shadow: 0 0 0 2px rgba(26, 18, 8, 0.55), 0 4px 10px rgba(0, 0, 0, 0.45);
        }

        .number-zone .num {
            color: var(--cream);
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 700;
            line-height: 0.9;
        }

        .number-zone .payout {
            color: var(--gold);
            font-family: var(--serif);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .center-zone {
            grid-column: 1 / 3;
            grid-row: 2;
        }

        .field-zone {
            grid-column: 3 / -1;
            grid-row: 2;
        }

        .come {
            grid-column: 1 / 4;
            grid-row: 3;
            min-height: 72px;
        }

        .dont-come {
            grid-column: 4 / -1;
            grid-row: 3;
            min-height: 72px;
        }

        .dont {
            grid-column: 1 / -1;
            grid-row: 4;
        }

        .pass {
            grid-column: 1 / -1;
            grid-row: 5;
        }

        .field-numbers {
            position: relative;
            z-index: 1;
            display: block;
            margin-top: 8px;
            color: var(--gold-bright);
            font-family: var(--font-display);
            font-size: clamp(1rem, 3vw, 1.55rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            line-height: 1;
        }

        .bet-btn {
            min-height: 116px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: linear-gradient(180deg, rgba(232, 199, 115, 0.08), rgba(0, 0, 0, 0.2));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 12px 28px rgba(0, 0, 0, 0.18);
            transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
        }

        .come,
        .dont-come {
            min-height: 72px;
        }

        .bet-btn::before {
            background:
                linear-gradient(135deg, rgba(232, 199, 115, 0.12), transparent 48%),
                radial-gradient(circle at 86% 16%, rgba(255, 255, 255, 0.06), transparent 32%);
            opacity: 1;
        }

        .bet-btn:hover,
        .bet-btn:focus-visible,
        .quick-btn:hover,
        .quick-btn:focus-visible,
        .number-btn:hover,
        .number-btn:focus-visible,
        .center-btn-tile:hover,
        .center-btn-tile:focus-visible,
        .close-btn:hover,
        .close-btn:focus-visible,
        .modal-btn:hover,
        .modal-btn:focus-visible,
        .odds-btn:hover,
        .odds-btn:focus-visible,
        .skip-btn:hover,
        .skip-btn:focus-visible {
            filter: brightness(1.08);
            transform: translateY(-1px);
            outline: none;
        }

        .bet-btn.has-bet,
        .number-btn.has-bet,
        .center-btn-tile.has-bet {
            border-color: var(--gold-bright);
            background: linear-gradient(180deg, rgba(232, 199, 115, 0.22), rgba(0, 0, 0, 0.1));
            box-shadow: 0 0 0 1px var(--gold), 0 0 24px rgba(232, 199, 115, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .bet-btn .label,
        .center-btn-tile .label {
            color: var(--cream);
            font-family: var(--serif);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-shadow: none;
        }

        .number-btn .num {
            color: var(--cream);
            font-family: var(--font-display);
            font-weight: 700;
            text-shadow: none;
        }

        .bet-btn .label {
            font-size: 1.02rem;
        }

        .bet-btn .amt,
        .number-btn .payout,
        .number-btn .bet-info,
        .center-btn-tile .payout,
        .center-btn-tile .bet-info {
            color: var(--gold);
            font-family: var(--serif);
        }

        .board-chip-stack {
            position: absolute;
            left: 50%;
            top: 50%;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-width: 48px;
            min-height: 42px;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        .chip-pile {
            position: relative;
            display: flex;
            align-items: center;
        }

        .odds-pile::after {
            content: attr(data-label);
            position: absolute;
            left: 50%;
            top: calc(100% - 2px);
            color: #f4c96a;
            font-size: 0.5rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
            transform: translateX(-50%);
        }

        .number-zone .board-chip-stack {
            top: auto;
            bottom: 6px;
            transform: translateX(-50%);
        }

        .number-zone .stack-place {
            left: 31%;
        }

        .number-zone .stack-come {
            left: 51%;
        }

        .number-zone .stack-dont-come {
            left: 71%;
        }

        .center-zone .board-chip-stack {

        .number-btn .num {

        .quick-amt {
            min-height: 46px;
            border: 1px solid rgba(255, 248, 223, 0.16);
            border-radius: 50%;
            background: #b91c1c;
            color: #ffffff;
            font-weight: 950;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.35);
            box-shadow:
                inset 0 0 0 4px rgba(255, 255, 255, 0.75),
                inset 0 0 0 8px rgba(127, 29, 29, 0.95),
                inset 0 -7px 10px rgba(0, 0, 0, 0.22),
                0 9px 18px rgba(0, 0, 0, 0.32);
        }

        .quick-amt:nth-child(2) {
            background: #1d4ed8;
            box-shadow:
                inset 0 0 0 4px rgba(255, 255, 255, 0.75),
                inset 0 0 0 8px rgba(30, 58, 138, 0.95),
                inset 0 -7px 10px rgba(0, 0, 0, 0.22),
                0 9px 18px rgba(0, 0, 0, 0.32);
        }

        .quick-amt:nth-child(3) {
            background: #f8fafc;
            color: #111827;
            text-shadow: none;

                inset 0 0 0 4px rgba(255, 255, 255, 0.95),

                inset 0 -7px 10px rgba(0, 0, 0, 0.12),
                0 9px 18px rgba(0, 0, 0, 0.32);
        }

        .quick-amt:nth-child(4) {
            background: #111827;
            box-shadow:
                inset 0 0 0 4px rgba(255, 255, 255, 0.75),
                inset 0 0 0 8px rgba(55, 65, 81, 0.95),
                inset 0 -7px 10px rgba(0, 0, 0, 0.28),
                0 9px 18px rgba(0, 0, 0, 0.32);
        }

        .point-popup h2 {
            color: var(--gold);
        }

        .point-popup .point-number {
            color: var(--text);
            font-size: 5rem;
        }

        .point-popup .point-text,
        footer {
            color: var(--muted);
        }

        @media (max-width: 980px) {
            .table {
                grid-template-columns: 1fr;

            }

            .dice-area {

        @media (max-width: 760px) {

                padding: 8px 0;

            .header {
                align-items: center;
                gap: 10px;
            }

            .header h1 {
                font-size: clamp(1.65rem, 8vw, 2.1rem);
            }

            .eyebrow {
                font-size: 0.64rem;
            }

            .balance-card {
                min-width: 132px;
                padding: 7px 9px;
            }

            .balance-label {
                font-size: 0.64rem;
            }

            .balance {
                font-size: 1rem;
            }

            .table {
                gap: 9px;
                padding: 8px;
                border-width: 6px;
            }

            .status-bar {
                min-height: 40px;
                padding: 8px 10px;
                font-size: 0.78rem;
                line-height: 1.22;
            }

            .main-bets {
                grid-template-columns: repeat(6, minmax(0, 1fr));
                grid-template-rows: auto minmax(82px, auto) minmax(58px, auto) minmax(58px, auto) minmax(70px, auto);
                gap: 6px;
            }

            .place-row {
                padding: 6px;
            }

            .layout-section-heading {
                margin-bottom: 6px;
                font-size: 0.58rem;
            }

            .layout-section-heading span:last-child {
                font-size: 0.56rem;
            }

            .place-number-row {
                gap: 5px;
            }

            .number-zone {
                min-height: 66px;
                padding: 7px 3px 5px;
            }

            .number-zone .num {
                font-size: clamp(1.25rem, 7vw, 2rem);
            }

            .number-zone .payout {
                font-size: 0.52rem;
                letter-spacing: 0;
            }

            .bet-btn {
                min-height: 82px;
                padding: 10px 7px;
            }

            .center-zone {
                grid-column: 1 / 3;
                grid-row: 2;
            }

            .field-zone {
                grid-column: 3 / -1;
                grid-row: 2;
            }

            .come {
                grid-column: 1 / 4;
                grid-row: 3;
                min-height: 58px;
            }

            .dont-come {
                grid-column: 4 / -1;
                grid-row: 3;
                min-height: 58px;
            }

            .dont {
                grid-column: 1 / -1;
                grid-row: 4;
                min-height: 58px;
            }

            .pass {
                grid-column: 1 / -1;
                grid-row: 5;
                min-height: 70px;
            }

            .bet-btn .label {
                font-size: 0.64rem;
                line-height: 1.15;
            }

            .bet-btn .amt {
                margin-top: 8px;
                font-size: 0.7rem;
                line-height: 1.2;
            }

            .field-numbers {
                font-size: clamp(0.8rem, 4.6vw, 1.05rem);
            }

            .casino-chip {
                width: 32px;
                height: 32px;
                font-size: 0.58rem;
                box-shadow:
                    inset 0 0 0 3px rgba(255, 255, 255, 0.9),
                    inset 0 0 0 7px color-mix(in srgb, var(--chip-color, #b91c1c) 72%, #000000),
                    inset 0 -6px 8px rgba(0, 0, 0, 0.22),
                    0 7px 12px rgba(0, 0, 0, 0.32);
            }

            .casino-chip + .casino-chip {
                margin-left: -14px;
            }

            .chip-note {
                font-size: 0.5rem;
            }

            .quick-actions {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .quick-btn,
            .roll-btn,
            .modal-btn,
            .odds-btn,
            .skip-btn,
            .close-btn {
                min-height: 40px;
                font-size: 0.78rem;
            }

            .dice-area {
                padding: 12px;
            }

            .numbers-grid,
            .center-grid {
                grid-template-columns: repeat(2, 1fr);
                padding-inline: 18px;
            }
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes tableSettle {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.99);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes panelSlideIn {
            from {
                opacity: 0;
                transform: translateX(16px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>

            <button type="button" class="center-btn-tile" id="craps3TileBtn" onclick="placeSelectedChip('craps3')"><span class="label">Ace-Deuce</span><span class="payout">15:1</span><span class="bet-info" id="craps3Info"></span></button>
            <button type="button" class="center-btn-tile" id="craps12TileBtn" onclick="placeSelectedChip('craps12')"><span class="label">Boxcars</span><span class="payout">30:1</span><span class="bet-info" id="craps12Info"></span></button>
            <button type="button" class="center-btn-tile" id="yo11TileBtn" onclick="placeSelectedChip('yo11')"><span class="label">Yo</span><span class="payout">15:1</span><span class="bet-info" id="yo11Info"></span></button>
            <button type="button" class="center-btn-tile" id="hard4TileBtn" onclick="placeSelectedChip('hard4')"><span class="label">Hard 4</span><span class="payout">7:1</span><span class="bet-info" id="hard4Info"></span></button>
            <button type="button" class="center-btn-tile" id="hard6TileBtn" onclick="placeSelectedChip('hard6')"><span class="label">Hard 6</span><span class="payout">9:1</span><span class="bet-info" id="hard6Info"></span></button>
            <button type="button" class="center-btn-tile" id="hard8TileBtn" onclick="placeSelectedChip('hard8')"><span class="label">Hard 8</span><span class="payout">9:1</span><span class="bet-info" id="hard8Info"></span></button>
            <button type="button" class="center-btn-tile" id="hard10TileBtn" onclick="placeSelectedChip('hard10')"><span class="label">Hard 10</span><span class="payout">7:1</span><span class="bet-info" id="hard10Info"></span></button>
        </div>
    </section>

    <!-- Bet Modal -->
    <div class="bet-modal" id="betModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="bet-modal-content">
            <h3 id="modalTitle">Bet</h3>
            <div class="bet-info-strip" id="modalBetExplain"></div>
            <div class="current-bet-info" id="modalCurrentBet"></div>
            <label class="sr-only" for="betInput">Bet amount</label>
            <input type="number" id="betInput" placeholder="0" min="5" step="5" aria-describedby="modalCurrentBet">
            <div class="quick-amounts">
                <button class="quick-amt" onclick="setModalAmt(5)">$5</button>
                <button class="quick-amt" onclick="setModalAmt(25)">$25</button>
                <button class="quick-amt" onclick="setModalAmt(50)">$50</button>
                <button class="quick-amt" onclick="setModalAmt(100)">$100</button>
            </div>
            <div class="modal-actions" id="modalActions">
                <button class="modal-btn cancel" onclick="closeBetModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="confirmBet()">Place Bet</button>
            </div>
        </div>
    </div>

    <!-- Point Established Popup -->
    <div class="point-popup" id="pointPopup" role="dialog" aria-modal="true" aria-labelledby="popupHeading">
        <div class="point-popup-content">
            <h2 id="popupHeading">TAKE ODDS</h2>
            <div class="point-number" id="popupPointNumber">6</div>
            <div class="point-text" id="popupText">Take odds on your Pass Line bet?</div>
            <div class="odds-buttons" id="popupOddsButtons">
                <button class="odds-btn" onclick="takeOddsFromPopup(1)">1x</button>
                <button class="odds-btn" onclick="takeOddsFromPopup(2)">2x</button>
                <button class="odds-btn" onclick="takeOddsFromPopup(3)">3x</button>
            </div>
            <button class="skip-btn" onclick="closePointPopup()">Cancel</button>
        </div>
    </div>

    <footer>
        <p>v3.1.0 &middot; Palmer Gill</p>
    </footer>

        window.CasinoHeader?.mount({ game: 'craps', label: 'Craps', mount: '#casino-header-mount' });
    </script>
    <script src="/shared/analytics.js?v=1"></script>
    <script src="/shared/rules-viewer.js?v=1"></script>

</body>
